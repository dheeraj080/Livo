server:
  port: 2000

spring:
  datasource:
    url: jdbc:postgresql://notes-db:5432/notes_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always

  security:
    oauth2:
      client:
        registration:
            # http://localhost:4005/login/oauth2/code/google
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
              - openid
          # http://localhost:4005/login/oauth2/code/github
          # http://localhost:4005/oauth2/authorization/github
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - read:email
              - read:user




logging:
  level:
    org.springframework.security: DEBUG
#    org.springframework.security.authentication.dao.DaoAuthenticationProvider: TRACE
#    org.springframework.security.authentication: TRACE
